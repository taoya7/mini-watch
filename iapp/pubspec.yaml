name: iapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.3.2
  web_socket_channel: ^3.0.1
  connectivity_plus: ^6.0.5
  battery_plus: ^6.0.3
  lucide_icons_flutter: ^3.1.14+2
  screen_brightness: ^2.1.2
  flutter_volume_controller: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/spellverse/perlinnoise.webp
    - assets/spellverse/perlinnoise2.webp
    - assets/spellverse/bluenoise.webp
  shaders:
    - shaders/earth.frag
    - shaders/fan.frag
    - shaders/traffic_light.frag
    - shaders/aura_bg.frag
    - shaders/agent_crt.frag
